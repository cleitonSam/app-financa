# ============================================================
# Financeiro do Casal — nginx DENTRO do container.
# Serve o PWA (estático) E faz proxy de /api -> backend Node (mesma origem).
# O EasyPanel/Traefik cuida do HTTPS na frente (porta 80 aqui dentro).
# ============================================================
server {
    listen 80;
    listen [::]:80;
    root /usr/share/nginx/html;
    index index.html;

    # --- Backend Node (login, sincronização, push, IA) ---
    # Mesma origem do app => sem CORS. O "^~" impede que o regex de assets
    # abaixo "roube" rotas como /api/algo.js.
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 75s;
        proxy_connect_timeout 10s;
        client_max_body_size 12m;   # fotos em base64 (comprovantes, pets, viagens)
    }

    # Service worker e index: sem cache, para atualizar na hora
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }
    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }

    # Ícones / assets: cache longo
    location ~* \.(png|ico|svg|woff2?|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
