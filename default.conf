# ============================================================
# Financeiro do Casal — nginx DENTRO do container.
# Serve o PWA (estático) E faz proxy de /api -> backend Node (mesma origem).
# O EasyPanel/Traefik cuida do HTTPS na frente (porta 80 aqui dentro).
# ============================================================
server {
    listen 80;
    listen [::]:80;
    root /usr/share/nginx/html;
    index index.html;

    # --- Backend Node (login, sincronização, push, IA) ---
    # Mesma origem do app => sem CORS. O "^~" impede que o regex de assets
    # abaixo "roube" rotas como /api/algo.js.
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For