# ============================================================
# Financeiro do Casal — configuração nginx (PWA estático)
# Use este server block na sua VPS. Ajuste "server_name" para
# o seu domínio e rode o certbot para o HTTPS (ver DEPLOY.md).
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name financeiro.seudominio.com.br;   # <-- TROQUE pelo seu domínio

    # Redireciona tudo para HTTPS (depois que o certbot estiver ativo)
    # return 301 https://$host$request_uri;      # <-- descomente após gerar o certificado

    root /var/www/financeiro;
    index index.html;

    # Arquivos do app: cache longo (têm nomes fixos)
    location ~* \.(png|ico|woff2?|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # index.html e service worker: nunca cachear, para receber updates na hora
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }
    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

